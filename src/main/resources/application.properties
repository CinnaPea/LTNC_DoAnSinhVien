spring.application.name=final_webapp

spring.datasource.url=jdbc:sqlserver://PEANUT;instanceName=SQLEXPRESS;databaseName=DoAnSinhVien;encrypt=true;trustServerCertificate=true;integratedSecurity=true;authenticationScheme=NativeAuthentication;sendStringParametersAsUnicode=true;useUnicode=true;characterEncoding=UTF-8
