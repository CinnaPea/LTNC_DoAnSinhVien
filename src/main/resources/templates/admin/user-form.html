<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Admin User Form')}"></head>
<body class="app-shell">
    <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

    <div class="main-wrapper">
        <div th:replace="~{fragments/admin-topbar :: topbar}"></div>

        <main class="content-area">
            <div class="container-fluid">
                <section class="dashboard-hero mb-4">
                    <div class="dashboard-hero-text">
                        <span class="dashboard-badge">Admin CRUD</span>
                        <h2 th:text="${pageTitle}">Tạo tài khoản mới</h2>
                        <p class="hero-sub-text mb-0">
                            Tài khoản mới sẽ được tạo trong bảng NguoiDung. Trigger SQL sẽ tự nối ND_ID sang hồ sơ SinhVien hoặc GiangVien.
                        </p>
                    </div>
                    <div class="dashboard-hero-icon">
                        <i class="fa-solid fa-user-gear"></i>
                    </div>
                </section>

                <div class="alert alert-danger mb-4" th:if="${error}" th:text="${error}"></div>

                <div class="dashboard-card">
                    <div class="dashboard-card-header">
                        <h5>
                            <i class="fa-solid fa-address-card me-2"></i>
                            Thông tin tài khoản
                        </h5>
                    </div>
                    <div class="dashboard-card-body">
                        <form class="profile-form"
                              th:object="${form}"
                              th:action="${formAction}"
                              method="post">
                            <div class="row g-3">
                                <div class="col-md-6" th:if="${!createMode}">
                                    <label class="form-label" for="ndId">ND_ID</label>
                                    <input id="ndId" class="form-control" th:field="*{ndId}" readonly>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label" for="username">Username</label>
                                    <input id="username" class="form-control" th:field="*{username}" maxlength="50" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label" for="email">Email</label>
                                    <input id="email" type="email" class="form-control" th:field="*{email}" maxlength="100" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label" for="profileName">Họ tên</label>
                                    <input id="profileName" class="form-control" th:field="*{profileName}" maxlength="100">
                                </div>
                                <div class="col-md-6" th:if="${createMode}">
                                    <label class="form-label" for="vaiTroId">Vai trò</label>
                                    <select id="vaiTroId" class="form-select" th:field="*{vaiTroId}" required>
                                        <option value="">Chọn vai trò</option>
                                        <option value="SV">SV</option>
                                        <option value="GV">GV</option>
                                    </select>
                                </div>
                                <div class="col-md-6" th:if="${!createMode}">
                                    <label class="form-label" for="vaiTroIdReadonly">Vai trò</label>
                                    <input id="vaiTroIdReadonly" class="form-control" th:value="${form.vaiTroId}" readonly>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label" for="password">
                                        <span th:text="${passwordLabel}">Mật khẩu</span>
                                    </label>
                                    <input id="password" type="password" class="form-control" th:field="*{password}" minlength="6">
                                </div>
                                <div class="col-md-6 d-flex align-items-end">
                                    <div class="form-check">
                                        <input id="active" class="form-check-input" type="checkbox" th:field="*{active}">
                                        <label class="form-check-label" for="active">Đang hoạt động</label>
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex flex-wrap gap-2 mt-4">
                                <button type="submit" class="btn btn-success">
                                    <i class="fa-solid fa-floppy-disk me-2"></i>
                                    <span th:text="${submitLabel}">Lưu</span>
                                </button>
                                <a class="btn btn-outline-secondary" th:href="@{/admin/dashboard}">
                                    <i class="fa-solid fa-arrow-left me-2"></i>Quay lại dashboard
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
